# YAML Configuration for GALib-Parallel
# This file contains all possible parameters for all supported algorithms.

algorithm:
  # Common Parameters
  type: "standard"
  max_generations: 200
  mutation_rate: 0.1
  crossover_rate: 0.9
  use_elitism: true
  threads: 0

  # Standard GA Specific Parameters
  standard:
    use_cuda: true

  # Differential Evolution Specific Parameters
  differential_evolution:
    f_weight: 0.8

  # Cellular GA Specific Parameters
  cellular:
    rows: 10
    cols: 10
    use_local_elitism: true

  # Island Model Specific Parameters
  island:
    topology: "fully_connected"
    migration_interval: 10
    migration_size: 10
    immigration_quota: 0.1
    buffer_capacity: 50

    # Migration Strategies
    replacer:
      type: "worst"
    selector:
      type: "elitism"

  # Genetic Operator Configuration
  selection:
    type: "tournament"
    tournament_size: 3

  mutation:
    type: "gaussian"
    sigma: 0.1

  crossover:
    type: "single_point"


output:
  console:
    enabled: true
    interval: 20
  file:
    enabled: false
    interval: 1
    path: "logs/evolution.csv"