# YAML Configuration for GALib-Parallel
# This file contains all possible parameters for all supported algorithms.

algorithm:
  # Common Parameters
  type: "standard"   # Options: "standard", "cellular", "island", "differential_evolution"
  max_generations: 1000

  mutation_rate: 0.1
  crossover_rate: 0.2        # Used as CR_rate in Differential Evolution
  use_elitism: true
  threads: 0                 # Number of threads for the parallelization

  # Standard GA Specific Parameters
  standard:
    use_cuda: true

  # Differential Evolution Specific Parameters
  differential_evolution:
    f_weight: 0.8            # Differential weight [0, 2]

  # Cellular GA Specific Parameters
  cellular:
    rows: 10
    cols: 10
    use_local_elitism: true

  # Island Model Specific Parameters
  island:
    topology: "fully_connected" # Options: "fully_connected", "one_way_ring", "bidirectional_ring"
    migration_interval: 10
    migration_size: 10
    immigration_quota: 0.1
    buffer_capacity: 50
    
    # Migration Strategies
    replacer:
      type: "worst"          # Options: "worst"
    selector:
      type: "elitism"        # Options: "elitism"

  # Genetic Operator Configuration
  selection:
    type: "tournament"       # Options: "tournament", "best_neighbor" (for cellular)
    tournament_size: 3
  
  mutation:
    type: "gaussian"         # Options: "gaussian", "uniform", "boundary"
    sigma: 0.1               # Only for gaussian
    
  crossover:
    type: "single_point"     # Options: "single_point", "arithmetic", "uniform"


output:
  console:
    enabled: true
    interval: 20
  file:
    enabled: false
    interval: 1
    path: "logs/evolution.csv"