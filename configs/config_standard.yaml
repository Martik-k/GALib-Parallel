problem:
  name: "Rastrigin"
  dimensions: 2
  lower_bound: -5.12
  upper_bound: 5.12

algorithm:
  type: "standard"
  max_generations: 50
  mutation_rate: 0.1
  crossover_rate: 0.9
  use_elitism: false
  pop_size: 250

  selection:
    type: "tournament"
    tournament_size: 3

  mutation:
    type: "gaussian"
    sigma: 0.1

  crossover:
    type: "single_point"

output:
  log_file: "logs/standard_ga_evolution.log"
