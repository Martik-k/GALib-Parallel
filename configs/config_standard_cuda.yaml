algorithm:
  type: "standard"
  pop_size: 1000
  max_generations: 200
  mutation_rate: 0.05
  crossover_rate: 0.8
  use_elitism: true

  standard:
    use_cuda: true

  selection:
    type: "tournament"
    tournament_size: 3

  mutation:
    type: "gaussian"
    sigma: 0.1

  crossover:
    type: "single_point"

output:
  console:
    enabled: true
    interval: 50
