problem:
  name: "Rastrigin"
  dimensions: 2
  lower_bound: -5.12
  upper_bound: 5.12

algorithm:
  type: "differential_evolution"
  max_generations: 700
  mutation_rate: 0.4  # F weight
  crossover_rate: 0.9  # CR rate
  pop_size: 150

  differential_evolution:
    f_weight: 0.8

output:
  log_file: "logs/de_evolution.log"